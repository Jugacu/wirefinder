# Build wirefinder on GitHub's machines.
#
# On every push and pull request, GitHub builds the WHOLE product from a clean
# checkout, in jobs that run in parallel:
#
#   core       — the privileged core: the `wirefinderd` daemon + `wirefinder`
#                CLI (the proto+daemon+cli Cargo workspace at the repo root).
#                ONE debug compile feeds fmt, clippy, tests, AND the uploaded
#                binaries — so the workspace is compiled once per run, not twice.
#   build-ui   — the unprivileged desktop app: the Tauri (React + tray) GUI in
#                ui/. Compiles it (debug) to PROVE it builds; does not ship it
#                yet. Release-mode UI is verified by release.yml on tags.
#
# These are the two halves of wirefinder's architecture (privileged daemon +
# unprivileged UI), and they install differently, so they build as separate
# jobs. Turning build-ui's output into an installer (.deb/AppImage) is the
# later packaging lesson; today it's a compile-only gate.
#
# Pinned to current major versions (verified 2026-06-14):
#   actions/checkout@v6      actions/upload-artifact@v7   dtolnay/rust-toolchain
#   Swatinem/rust-cache@v2   actions/setup-node@v6        pnpm/action-setup@v6
#   awalsh128/cache-apt-pkgs-action@v1

name: build

# WHEN this runs: pushes to `main`, plus every pull request (against any branch).
# So work on a feature branch runs CI only once it's in a PR — not on every
# scratch push — while `main` always stays verified. Tag pushes are handled by
# release.yml, so a `v*` tag cuts a release without a redundant run here.
# This is the "events" half of GitHub Actions: a workflow is dormant YAML until
# an event it listens for happens.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # The privileged core (daemon + cli + proto), the root Cargo workspace. ONE
  # debug compile serves every check: fmt and clippy and tests and the uploaded
  # binaries all share the same target/, so the workspace is compiled once per
  # run instead of once for "build it" and again for "test it". Steps are ordered
  # cheapest-first so a formatting or lint slip fails in seconds.
  core:
    # The runner: a throwaway VM GitHub gives you, fresh every run.
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your repo onto the runner. Without this the VM is empty.
      - name: Checkout
        uses: actions/checkout@v6

      # 2. Install a Rust toolchain (rustc + cargo) WITH clippy + rustfmt — neither
      #    is installed by default, and the quality steps below need both.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # 3. Cache ~/.cargo and target/ keyed on Cargo.lock + rustc version, so the
      #    second run doesn't recompile every dependency from scratch.
      #    The workspace is the repo root, so cache the default `. -> target`.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # 4. Quality gates, cheapest-first. fmt is a pure text check (no compile);
      #    clippy then compiles the workspace (debug) and fails on any warning;
      #    tests reuse clippy's artifacts to run the proto round-trip + the rest.
      - name: Format check
        run: cargo fmt --all --check                       # style: fail on any diff from rustfmt
      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings   # idiom/correctness: warnings = failure
      - name: Tests
        run: cargo test --workspace                        # behaviour: the proto contract round-trip + more

      # 5. The artifact. A plain `cargo build` (debug) reuses the objects clippy
      #    and the tests already compiled, so this adds the final link, not a
      #    second from-scratch compile. It's a throwaway per-run PR artifact, so
      #    debug is fine — release.yml ships the optimized binaries.
      - name: Build binaries
        run: cargo build

      # `path` lists files (it ignores any step working-directory — it's relative
      # to the repo root). `if-no-files-found: error` means a silently-renamed
      # binary FAILS the run instead of uploading nothing — honest CI.
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: wirefinder-linux-x86_64
          path: |
            target/debug/wirefinder
            target/debug/wirefinderd
          if-no-files-found: error

  # The desktop GUI. Runs in parallel with `build`. This job only proves the
  # Tauri app COMPILES — it doesn't ship anything yet (that's the packaging
  # lesson). The UI is its own Cargo workspace under ui/src-tauri and pulls
  # in webkit + GTK system libs, which is why it can't ride along in `build`.
  build-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Tauri's Linux build dependencies (Ubuntu 24.04 → webkit2gtk 4.1). Needed
      # to compile and link the webview and the appindicator tray. patchelf is
      # only used by bundling, but it's cheap and keeps the env build-complete.
      # The cache action installs these AND caches the downloaded .debs, so later
      # runs restore them instead of re-fetching from the apt mirrors each time.
      - name: Install Tauri system deps
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libayatana-appindicator3-dev
            librsvg2-dev
            build-essential file libssl-dev libxdo-dev patchelf
          version: 1.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ui/src-tauri is a SEPARATE Cargo workspace from the root (its own
      # Cargo.lock), so the cache points at it specifically.
      - name: Cache cargo (ui)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ui/src-tauri -> target"

      # pnpm BEFORE setup-node: setup-node's pnpm cache runs `pnpm store path`,
      # so the pnpm binary has to exist first. Versions match Julian's machine
      # (pnpm 10, node 20).
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      # Build the whole app to prove it compiles. --debug uses the dev profile
      # (no release optimization) — this is only a compile gate, the binary is
      # never shipped from here, so we skip the slow optimized build; release.yml
      # verifies the release profile on tags. --no-bundle skips the .deb/AppImage
      # installer generation (deferred to the packaging lesson). tauri.conf.json's
      # beforeBuildCommand (`pnpm build` = tsc && vite build) still type-checks and
      # bundles the frontend before the Rust compile regardless of profile.
      - name: Build Tauri app (debug, no bundle)
        working-directory: ui
        run: pnpm tauri build --debug --no-bundle

  # Quality gate for the frontend: is the TypeScript/React/CSS correct and clean,
  # not just compilable? The UI mirror of the Rust checks in the `core` job. It's cheap
  # (no webkit, no Rust), so it runs as its own fast job and fails in seconds —
  # giving lint/format/type feedback long before build-ui's full Tauri compile
  # finishes. Biome (lint + format, one binary) and tsc are dev deps in ui/.
  lint-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # pnpm BEFORE setup-node (same reason as build-ui: setup-node's pnpm cache
      # calls `pnpm store path`, so the binary must exist first). Versions match
      # Julian's machine (pnpm 10, node 20).
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # `biome ci` is the non-writing, CI-tuned command: it lints AND format-checks
      # in one pass and fails on any diff or lint error (no --write here — CI proves,
      # it doesn't fix). Then tsc type-checks; build-ui also type-checks via the full
      # build, but this fails fast and pinpoints type errors without the webkit compile.
      - name: Biome lint + format check
        run: pnpm biome ci .
      - name: Typecheck
        run: pnpm typecheck

  # Supply-chain gate. Runs in parallel with the build jobs and reads the policy
  # in deny.toml: security advisories, license allow-list, duplicate/forbidden
  # crates, and crate sources. A NEW advisory or a disallowed license fails CI.
  # We take the cargo-deny authors' own action (Docker-prebuilt, so it doesn't
  # recompile the tool each run) and pin it — a deliberate, reviewed dependency,
  # not a reflexive one.
  deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
