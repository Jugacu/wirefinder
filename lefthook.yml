# Git hooks for the wirefinder repo. The repo root holds the Rust workspace; the
# desktop UI lives in ui/ (its own pnpm package). Git keeps a single hooks dir at the
# repo root, so the hook config lives here even though today it only drives the UI.
#
# The UI hook is installed via ui/package.json's `prepare` script (`lefthook install`),
# which runs automatically after `pnpm install` in ui/.
pre-commit:
  parallel: true
  commands:
    # On commit, Biome lints + formats only the STAGED files under ui/ (root: "ui/"
    # filters to that subtree and runs the command from there). It auto-fixes what it
    # can and re-stages the fixes; anything it can't fix (a real lint error) aborts the
    # commit. The Rust side is gated in CI (cargo fmt/clippy) rather than here.
    biome-ui:
      root: "ui/"
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
